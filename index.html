<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小豆芽 🌱 班級收件小幫手</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #4CAF50;
            --primary-light: #e8f5e9;
            --exempt: #FF9800;
            --edit-color: #2196F3;
            --edit-light: #e3f2fd;
            --text-dark: #333;
            --bg-gray: #f5f5f5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-dark);
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2 { color: var(--primary); text-align: center; }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .inline-setup { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; }
        .form-group { display: flex; align-items: center; gap: 5px; }
        label { font-weight: bold; color: #555; font-size: 14px;}
        input[type="text"], input[type="number"], input[type="date"], input[type="month"] {
            padding: 8px; border: 1px solid #ccc; border-radius: 6px;
        }
        
        button {
            background-color: var(--primary); color: white; border: none; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold;
            transition: 0.2s; white-space: nowrap;
        }
        button:hover { background-color: #45a049; transform: scale(1.02); }
        button.danger { background-color: #f44336; }
        button.danger:hover { background-color: #d32f2f; }
        button.edit-btn { background-color: var(--edit-color); }
        button.export-btn { background-color: #9C27B0; }
        button.export-btn:hover { background-color: #7B1FA2; }
        button.all-btn { background-color: #607D8B; }
        button.all-btn:hover { background-color: #455A64; }
        
        button.voice-btn { background-color: #2196F3; font-size: 16px; width: 100%; max-width: 300px;}
        button.voice-btn:hover { background-color: #1976D2; }
        button.voice-btn.listening { background-color: #f44336; animation: pulse 1.5s infinite; }
        button.voice-btn.standby { background-color: var(--exempt); animation: none; } /* 待機橘色狀態 */
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(244, 67, 54, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); }
        }

        .set-box { border: 2px dashed #81C784; padding: 15px; border-radius: 10px; margin-bottom: 20px; background-color: #fafafa; }
        .set-header { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 15px; align-items: center; border-bottom: 2px solid var(--primary-light); padding-bottom: 10px; }
        .set-header input { flex: 1; min-width: 120px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 8px; }
        .num-btn {
            background-color: white; color: #666; border: 2px solid #ddd; border-radius: 50%;
            width: 45px; height: 45px; display: flex; justify-content: center; align-items: center;
            font-size: 16px; font-weight: bold; cursor: pointer; user-select: none; transition: 0.1s;
        }
        .num-btn.active { background-color: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 8px rgba(76, 175, 80, 0.5); }
        .num-btn.exempt { background-color: var(--exempt); color: white; border-color: var(--exempt); }
        .edit-mode .num-btn.active { background-color: var(--edit-color); border-color: var(--edit-color); }
        
        .num-btn.just-clicked { animation: popHighlight 0.5s ease-out; }
        @keyframes popHighlight {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); box-shadow: 0 0 15px var(--primary); }
            100% { transform: scale(1); }
        }

        .history-header {
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
            background-color: var(--primary-light); padding: 12px 15px; border-radius: 8px;
            border: 1px solid #c8e6c9; margin-bottom: 15px; gap: 10px;
        }
        .history-title { margin: 0; color: var(--primary); font-size: 20px; white-space: nowrap; }
        .filter-group { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; flex-wrap: wrap; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: var(--primary-light); color: var(--primary); white-space: nowrap; }

        .tr-cleared { background-color: #f6fdf8; }
        .tr-cleared td:first-child {
            border-left: 6px solid #00C853 !important; 
            box-shadow: inset 6px 0 10px rgba(0, 200, 83, 0.15);
        }

        .tr-pending { background-color: #ffffff; }
        .tr-pending td:first-child {
            border-left: 6px solid #2196F3 !important; 
            box-shadow: inset 6px 0 10px rgba(33, 150, 243, 0.15);
        }

        .tr-overdue { background-color: #fffafa; }
        .tr-overdue td:first-child {
            border-left: 6px solid #ff3366 !important; 
            animation: energyAlert 1.2s infinite alternate ease-in-out;
        }

        @keyframes energyAlert {
            0% { border-left-color: #ff3366; box-shadow: inset 2px 0 5px rgba(255, 51, 102, 0.2); }
            100% { border-left-color: #ff88aa; box-shadow: inset 12px 0 20px rgba(255, 51, 102, 0.7); }
        }
        
        .legend { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; font-size: 13px; color: #666; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        
        .action-btns { display: flex; gap: 5px; }
        .hide-on-export { display: table-cell; }
    </style>
</head>
<body>

    <h1>🌱 小豆芽：班級收件小幫手 ✨</h1>

    <div class="card" id="setupCard">
        <div class="inline-setup">
            <div class="form-group"><label>班級</label><input type="text" id="className" value="一年甲班" style="width: 100px;"></div>
            <div class="form-group"><label>人數</label><input type="number" id="studentCount" value="30" style="width: 60px;"></div>
            <div class="form-group"><label>組數</label><input type="number" id="setCount" value="1" style="width: 50px;"></div>
            <button onclick="generateTracker()">🚀 產生號碼表</button>
        </div>
    </div>

    <div class="card" id="trackerCard" style="display: none;">
        <div class="legend">
            <span><div class="legend-dot" style="background-color: var(--primary);"></div> 已交</span>
            <span><div class="legend-dot" style="background-color: var(--exempt);"></div> 免交</span>
            <span>(點擊切換狀態)</span>
        </div>
        
        <div style="text-align: center; margin-bottom: 15px; background: #e3f2fd; padding: 15px; border-radius: 8px; border: 2px dashed #90caf9;">
            <button id="voiceBtn" class="voice-btn" onclick="toggleVoiceRecognition(false)">🎤 開啟語音點名</button>
            <div id="voiceStatus" style="color: #1976D2; font-size: 15px; margin-top: 10px; font-weight: bold; min-height: 24px; transition: 0.3s;">
                點擊按鈕，允許麥克風後即可用語音報號喔！
            </div>
        </div>

        <div id="gridsArea"></div>
        
        <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
            <button onclick="saveRecord()">💾 儲存紀錄</button>
            <button onclick="resetTracker()" class="danger">❌ 取消返回</button>
        </div>
    </div>

    <div class="card edit-mode" id="editCard" style="display: none; border: 2px solid var(--edit-color);">
        <h2 style="color: var(--edit-color); font-size: 20px;">✏️ 修改紀錄模式</h2>
        
        <div style="text-align: center; margin-bottom: 15px; background: var(--edit-light); padding: 15px; border-radius: 8px; border: 2px dashed var(--edit-color);">
            <button id="editVoiceBtn" class="voice-btn" onclick="toggleVoiceRecognition(true)">🎤 開啟語音修改</button>
            <div id="editVoiceStatus" style="color: #1976D2; font-size: 15px; margin-top: 10px; font-weight: bold; min-height: 24px; transition: 0.3s;">
                點擊按鈕，允許麥克風後即可用語音修改補登號碼喔！
            </div>
        </div>

        <div class="set-box" style="border-color: var(--edit-color); background-color: var(--edit-light);">
            <div class="set-header">
                <input type="text" id="editTitle" placeholder="標題" style="flex:2; min-width: 150px;">
                <div style="display: flex; gap: 5px; align-items: center;">
                    <span style="font-size: 13px; color: #666; white-space: nowrap;">📝 發放</span>
                    <input type="date" id="editDate" style="padding: 6px;">
                </div>
                <div style="display: flex; gap: 5px; align-items: center;">
                    <span style="font-size: 13px; color: #666; white-space: nowrap;">⏳ 截止</span>
                    <input type="date" id="editDueDate" style="padding: 6px;">
                </div>
                <input type="text" id="editMemo" placeholder="備註" style="flex:1; min-width: 120px;">
            </div>
            <div id="editGridArea" class="grid-container"></div>
        </div>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button onclick="saveEdit()" class="edit-btn">💾 儲存修改內容</button>
            <button onclick="cancelEdit()" class="danger">❌ 取消不儲存</button>
        </div>
    </div>

    <div class="card" id="historyCardContainer">
        <div class="history-header">
            <h2 class="history-title">📚 歷史總表</h2>
            <div class="filter-group hide-on-export">
                <input type="text" id="searchKeyword" placeholder="🔍 搜尋標題..." style="width: 130px;" onkeypress="if(event.key === 'Enter') applyFilter()">
                <span style="color:#ccc; margin: 0 5px;">|</span>
                <input type="month" id="filterStart">
                <label style="color:#666;">～</label>
                <input type="month" id="filterEnd">
                <button onclick="applyFilter()" style="padding: 6px 12px; font-size: 14px;">🔍 查詢</button>
                <button onclick="showAllRecords()" class="all-btn" style="padding: 6px 12px; font-size: 14px;">📂 全部</button>
            </div>
            <button class="export-btn" onclick="exportToImage()">📸 輸出成圖檔</button>
        </div>
        <div id="captureArea" style="background: white; padding: 10px; border-radius: 8px;">
            <div style="overflow-x: auto;">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>狀態 / 日期</th>
                            <th style="width: 1%;">班級 (人數)</th>
                            <th>標題 / 備註</th>
                            <th>已交</th>
                            <th>免交</th>
                            <th>未交</th>
                            <th class="hide-on-export" style="width: 1%;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentSetsData = [];
        let editSubmittedSet = new Set(), editExemptSet = new Set(), editingRecordId = null;
        let isShowingAll = false;

        // 🌱 語音辨識大腦變數
        let recognition = null;
        let isListening = false;
        let isEditVoiceMode = false;
        
        // 🛡️ 待機系統變數
        let isStandbyMode = false;
        let standbyTimer = null;
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSuccessSound() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); 
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        const lastClassName = localStorage.getItem('sproutLastClassName');
        const lastStudentCount = localStorage.getItem('sproutLastStudentCount');
        if (lastClassName) document.getElementById('className').value = lastClassName;
        if (lastStudentCount) document.getElementById('studentCount').value = lastStudentCount;

        initFilterDates();
        loadHistory();

        function initFilterDates() {
            const today = new Date();
            const yyyy = today.getFullYear();
            let mm = today.getMonth() + 1;
            if (mm < 10) mm = '0' + mm;
            const currentMonth = `${yyyy}-${mm}`;
            document.getElementById('filterStart').value = currentMonth;
            document.getElementById('filterEnd').value = currentMonth;
        }

        function applyFilter() { isShowingAll = false; loadHistory(); }

        function showAllRecords() {
            isShowingAll = true;
            document.getElementById('filterStart').value = '';
            document.getElementById('filterEnd').value = '';
            document.getElementById('searchKeyword').value = '';
            loadHistory();
        }

        function generateTracker() {
            const className = document.getElementById('className').value;
            const count = parseInt(document.getElementById('studentCount').value);
            const sets = parseInt(document.getElementById('setCount').value);
            if (!className || count < 1) return alert("請輸入正確資料唷！");

            localStorage.setItem('sproutLastClassName', className);
            localStorage.setItem('sproutLastStudentCount', count);

            const gridsArea = document.getElementById('gridsArea');
            gridsArea.innerHTML = '';
            currentSetsData = [];
            const today = new Date().toISOString().split('T')[0];

            for (let s = 0; s < sets; s++) {
                currentSetsData.push({ submitted: new Set(), exempt: new Set() }); 
                const setBox = document.createElement('div');
                setBox.className = 'set-box';
                setBox.innerHTML = `
                    <div class="set-header">
                        <strong style="white-space: nowrap;">組別 #${s + 1}</strong>
                        <input type="text" id="title-${s}" placeholder="標題 (必填)" style="flex:2; min-width: 150px;">
                        
                        <div style="display: flex; gap: 5px; align-items: center;">
                            <span style="font-size: 13px; color: #666; white-space: nowrap;">📝 發放</span>
                            <input type="date" id="date-${s}" value="${today}" style="padding: 6px;">
                        </div>
                        <div style="display: flex; gap: 5px; align-items: center;">
                            <span style="font-size: 13px; color: #666; white-space: nowrap;">⏳ 截止</span>
                            <input type="date" id="dueDate-${s}" style="padding: 6px;">
                        </div>
                        
                        <input type="text" id="memo-${s}" placeholder="備註 (選填)" style="flex:1; min-width: 120px;">
                    </div>
                    <div class="grid-container" id="grid-${s}"></div>
                `;
                gridsArea.appendChild(setBox);
                const grid = setBox.querySelector(`#grid-${s}`);
                for (let i = 1; i <= count; i++) {
                    const btn = document.createElement('div');
                    btn.className = 'num-btn';
                    btn.textContent = i;
                    btn.onclick = function() {
                        if (!this.classList.contains('active') && !this.classList.contains('exempt')) {
                            this.classList.add('active'); currentSetsData[s].submitted.add(i);
                        } else if (this.classList.contains('active')) {
                            this.classList.remove('active'); this.classList.add('exempt');
                            currentSetsData[s].submitted.delete(i); currentSetsData[s].exempt.add(i);
                        } else {
                            this.classList.remove('exempt'); currentSetsData[s].exempt.delete(i);
                        }
                    };
                    grid.appendChild(btn);
                }
            }
            document.getElementById('setupCard').style.display = 'none';
            document.getElementById('trackerCard').style.display = 'block';
        }

        function resetTracker() { 
            stopVoiceRecognition(); 
            document.getElementById('setupCard').style.display = 'block'; 
            document.getElementById('trackerCard').style.display = 'none'; 
        }

        function saveRecord() {
            const className = document.getElementById('className').value;
            const total = document.getElementById('studentCount').value;
            let records = JSON.parse(localStorage.getItem('sproutRecords')) || [];
            let lastSavedMonth = '';

            for (let s = 0; s < currentSetsData.length; s++) {
                const title = document.getElementById(`title-${s}`).value.trim();
                const recordDate = document.getElementById(`date-${s}`).value;
                const recordDueDate = document.getElementById(`dueDate-${s}`).value;
                
                if (!title) { alert(`請輸入第 ${s + 1} 組標題`); return; }
                
                records.push({
                    id: Date.now() + s, date: recordDate, dueDate: recordDueDate,
                    className: className, title: title, memo: document.getElementById(`memo-${s}`).value.trim(),
                    total: total, submitted: Array.from(currentSetsData[s].submitted).sort((a, b) => a - b),
                    exempt: Array.from(currentSetsData[s].exempt).sort((a, b) => a - b)
                });
                lastSavedMonth = recordDate.substring(0, 7); 
            }
            localStorage.setItem('sproutRecords', JSON.stringify(records));
            
            stopVoiceRecognition(); 
            alert("✨ 儲存成功！"); 
            
            if (!isShowingAll) {
                document.getElementById('filterStart').value = lastSavedMonth;
                document.getElementById('filterEnd').value = lastSavedMonth;
            }
            resetTracker(); loadHistory();
        }

        // ==============================
        // 🌱 語音辨識核心魔法 (雙核 + 待機喚醒防護)
        // ==============================

        function getVoiceUI() {
            return {
                btn: document.getElementById(isEditVoiceMode ? 'editVoiceBtn' : 'voiceBtn'),
                status: document.getElementById(isEditVoiceMode ? 'editVoiceStatus' : 'voiceStatus')
            };
        }

        // 啟動 10 秒倒數計時器
        function resetStandbyTimer() {
            clearTimeout(standbyTimer);
            if (isListening && !isStandbyMode) {
                standbyTimer = setTimeout(() => {
                    enterStandbyMode();
                }, 10000); // 10秒未聽取數字，進入待機
            }
        }

        // 進入待機模式
        function enterStandbyMode() {
            if (!isListening) return;
            isStandbyMode = true;
            const ui = getVoiceUI();
            ui.btn.innerHTML = '💤 語音待機中 (聆聽喚醒詞...)';
            ui.btn.classList.remove('listening');
            ui.btn.classList.add('standby');
            ui.status.innerHTML = '💤 已進入防誤聽待機模式。<br>請對麥克風說「<span style="color:#f44336; font-weight:bold;">紀錄</span>」重新喚醒小豆芽！';
        }

        function toggleVoiceRecognition(isEdit = false) {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert("小豆芽提醒：妳的瀏覽器目前不支援語音功能喔！建議使用最新版的 Google Chrome 瀏覽器。");
                return;
            }
            if (!audioCtx) audioCtx = new AudioContext();

            if (isListening && isEditVoiceMode !== isEdit) {
                stopVoiceRecognition();
            }

            isEditVoiceMode = isEdit;

            if (isListening) stopVoiceRecognition();
            else startVoiceRecognition();
        }

        function startVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!recognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = true; 
                recognition.interimResults = true; 
                recognition.lang = 'zh-TW'; 

                recognition.onstart = function() {
                    isListening = true;
                    isStandbyMode = false; // 每次啟動都先醒著
                    const ui = getVoiceUI();
                    ui.btn.innerHTML = '🛑 停止語音 (正在聆聽...)';
                    ui.btn.classList.remove('standby');
                    ui.btn.classList.add('listening');
                    ui.status.innerHTML = '👂 小豆芽聽命！請直接念出座號... (10秒未念數字將自動待機保護)';
                    resetStandbyTimer();
                };

                recognition.onresult = function(event) {
                    let interimTranscript = '';
                    let finalTranscript = '';

                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                        else interimTranscript += event.results[i][0].transcript;
                    }

                    const ui = getVoiceUI();
                    
                    if (interimTranscript) {
                        if (!isStandbyMode) {
                            ui.status.innerHTML = `💬 努力聽取中：<span style="color:#aaa;">"${interimTranscript}"</span>`;
                        } else {
                            ui.status.innerHTML = `💤 待機防護中...(聽到聲音，若需點名請說「紀錄」喚醒)`;
                        }
                    }

                    if (finalTranscript) {
                        processVoiceCommand(finalTranscript);
                    }
                };

                recognition.onerror = function(event) {
                    if (event.error === 'not-allowed') {
                        getVoiceUI().status.innerHTML = '⚠️ 瀏覽器被拒絕使用麥克風囉，請在網址列旁邊允許麥克風權限！';
                        stopVoiceRecognition();
                    }
                };
                recognition.onend = function() { if (isListening) recognition.start(); };
            }
            recognition.start();
        }

        function stopVoiceRecognition() {
            isListening = false;
            isStandbyMode = false;
            clearTimeout(standbyTimer);
            if (recognition) recognition.stop();
            const ui = getVoiceUI();
            if (ui.btn) {
                ui.btn.innerHTML = isEditVoiceMode ? '🎤 開啟語音修改' : '🎤 開啟語音點名';
                ui.btn.classList.remove('listening');
                ui.btn.classList.remove('standby');
            }
            if (ui.status) {
                ui.status.innerHTML = '語音已暫停。點擊上方按鈕隨時可以重新開始！';
            }
        }

        function processVoiceCommand(text) {
            const ui = getVoiceUI();

            // 🛑 如果在待機模式，攔截所有數字，只聽「喚醒詞」
            if (isStandbyMode) {
                if (text.includes('紀錄') || text.includes('記錄')) {
                    isStandbyMode = false;
                    ui.btn.innerHTML = '🛑 停止語音 (正在聆聽...)';
                    ui.btn.classList.remove('standby');
                    ui.btn.classList.add('listening');
                    playSuccessSound(); // 播放喚醒音效
                    ui.status.innerHTML = '✨ 喚醒成功！小豆芽繼續聽命...';
                    resetStandbyTimer();

                    // 檢查喚醒詞後面有沒有直接跟著數字 (例如: "紀錄 5號")
                    let wakeIndex = Math.max(text.indexOf('紀錄'), text.indexOf('記錄'));
                    let afterWakeWord = text.substring(wakeIndex + 2);
                    if (afterWakeWord.match(/\d+/g)) {
                        setTimeout(() => processVoiceCommand(afterWakeWord), 300);
                    }
                }
                return; // 待機中，不管聽懂沒聽懂，都在此打住
            }

            // 🟢 以下為活躍模式：正常處理數字
            let numbers = text.match(/\d+/g);
            if (numbers) {
                let maxCount = isEditVoiceMode 
                    ? document.querySelectorAll('#editGridArea .num-btn').length 
                    : parseInt(document.getElementById('studentCount').value);
                
                let clickedNums = [];
                let grid = document.getElementById(isEditVoiceMode ? 'editGridArea' : 'grid-0');
                
                numbers.forEach(numStr => {
                    let num = parseInt(numStr);
                    if (num >= 1 && num <= maxCount) {
                        if (grid) {
                            const btns = grid.querySelectorAll('.num-btn');
                            const targetBtn = btns[num - 1]; 
                            if (targetBtn && !targetBtn.classList.contains('active') && !targetBtn.classList.contains('exempt')) {
                                targetBtn.click();
                                clickedNums.push(num);
                                targetBtn.classList.add('just-clicked');
                                setTimeout(() => targetBtn.classList.remove('just-clicked'), 500);
                            }
                        }
                    }
                });
                
                if (clickedNums.length > 0) {
                    playSuccessSound();
                    ui.status.innerHTML = `✅ 聽到「${text}」👉 <span style="color:var(--primary); font-size:18px;">成功勾選: ${clickedNums.join(', ')}</span>`;
                } else {
                    ui.status.innerHTML = `🤔 聽到「${text}」，但這些號碼已經點過了喔！(若需更正請手動點擊)`;
                }
                
                // 只要有唸數字 (代表還在工作)，就重置 10 秒計時器
                resetStandbyTimer(); 
            } else {
                ui.status.innerHTML = `🤔 確定句子「${text}」，但裡面沒有數字喔！`;
                // 若只聊天沒念數字，不重置計時器，讓它自然防護待機
            }
        }
        // ==============================

        function editRecord(id) {
            let records = JSON.parse(localStorage.getItem('sproutRecords')) || [];
            const r = records.find(record => record.id === id);
            if (!r) return;
            editingRecordId = id; editSubmittedSet = new Set(r.submitted); editExemptSet = new Set(r.exempt || []);
            document.getElementById('editDate').value = r.date; 
            document.getElementById('editDueDate').value = r.dueDate || ''; 
            document.getElementById('editTitle').value = r.title; 
            document.getElementById('editMemo').value = r.memo || '';
            const grid = document.getElementById('editGridArea');
            grid.innerHTML = '';
            for (let i = 1; i <= r.total; i++) {
                const btn = document.createElement('div');
                btn.className = 'num-btn'; btn.textContent = i;
                if (editSubmittedSet.has(i)) btn.classList.add('active'); else if (editExemptSet.has(i)) btn.classList.add('exempt');
                btn.onclick = function() {
                    if (!this.classList.contains('active') && !this.classList.contains('exempt')) { this.classList.add('active'); editSubmittedSet.add(i); }
                    else if (this.classList.contains('active')) { this.classList.remove('active'); this.classList.add('exempt'); editSubmittedSet.delete(i); editExemptSet.add(i); }
                    else { this.classList.remove('exempt'); editExemptSet.delete(i); }
                };
                grid.appendChild(btn);
            }
            document.getElementById('setupCard').style.display = 'none'; document.getElementById('historyCardContainer').style.display = 'none'; document.getElementById('editCard').style.display = 'block';
        }

        function saveEdit() {
            let records = JSON.parse(localStorage.getItem('sproutRecords')) || [];
            const idx = records.findIndex(r => r.id === editingRecordId);
            if (idx !== -1) {
                records[idx].date = document.getElementById('editDate').value; 
                records[idx].dueDate = document.getElementById('editDueDate').value; 
                records[idx].title = document.getElementById('editTitle').value.trim();
                records[idx].memo = document.getElementById('editMemo').value.trim(); 
                records[idx].submitted = Array.from(editSubmittedSet).sort((a, b) => a - b);
                records[idx].exempt = Array.from(editExemptSet).sort((a, b) => a - b);
                localStorage.setItem('sproutRecords', JSON.stringify(records)); alert("✨ 修改成功！");
            }
            cancelEdit(); loadHistory();
        }

        function cancelEdit() { 
            stopVoiceRecognition(); // 切換畫面時關閉語音
            document.getElementById('editCard').style.display = 'none'; 
            document.getElementById('setupCard').style.display = 'block'; 
            document.getElementById('historyCardContainer').style.display = 'block'; 
        }

        function loadHistory() {
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '';
            let records = JSON.parse(localStorage.getItem('sproutRecords')) || [];
            
            const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();
            const todayStr = new Date().toISOString().split('T')[0];
            
            records = records.filter(r => {
                let keywordMatch = true;
                if (keyword) keywordMatch = r.title.toLowerCase().includes(keyword);

                let dateMatch = true;
                if (!isShowingAll) {
                    const startMonth = document.getElementById('filterStart').value;
                    const endMonth = document.getElementById('filterEnd').value;
                    const recordMonth = r.date.substring(0, 7);
                    if (startMonth && endMonth) dateMatch = (recordMonth >= startMonth && recordMonth <= endMonth);
                    else if (startMonth) dateMatch = (recordMonth >= startMonth);
                    else if (endMonth) dateMatch = (recordMonth <= endMonth);
                }
                return keywordMatch && dateMatch;
            });

            records.forEach(r => {
                const exempt = r.exempt || [];
                let unhandedCount = 0;
                for (let i = 1; i <= r.total; i++) {
                    if (!r.submitted.includes(i) && !exempt.includes(i)) unhandedCount++;
                }
                
                r.isCleared = (unhandedCount === 0);
                r.isOverdue = (!r.isCleared && r.dueDate && todayStr > r.dueDate);
                
                if (r.isOverdue) r.sortPriority = 1;
                else if (!r.isCleared) r.sortPriority = 2;
                else r.sortPriority = 3;
            });

            records.sort((a, b) => {
                if (a.sortPriority !== b.sortPriority) {
                    return a.sortPriority - b.sortPriority; 
                }
                return new Date(b.date) - new Date(a.date) || b.id - a.id;
            });

            records.forEach(r => {
                const exempt = r.exempt || [];
                let unhandedArray = [];
                for (let i = 1; i <= r.total; i++) {
                    if (!r.submitted.includes(i) && !exempt.includes(i)) unhandedArray.push(i);
                }

                let rowClass = 'tr-pending'; 
                if (r.isCleared) rowClass = 'tr-cleared'; 
                else if (r.isOverdue) rowClass = 'tr-overdue'; 

                let dateDisplay = `<span style="color:#666;">發放: ${r.date}</span>`;
                if (r.dueDate) {
                    let dueColor = r.isOverdue ? '#f44336' : '#2196F3';
                    if (r.isCleared) dueColor = '#00C853'; 
                    dateDisplay += `<br><strong style="color:${dueColor};">截止: ${r.dueDate}</strong>`;
                }

                const tr = document.createElement('tr');
                tr.className = rowClass; 
                tr.innerHTML = `
                    <td style="white-space: nowrap;"><small>${dateDisplay}</small></td>
                    <td>${r.className}<br><small>(${r.total} 人)</small></td>
                    <td><strong>${r.title}</strong>${r.memo ? `<br><small style="color:#888;">📝 ${r.memo}</small>` : ''}</td>
                    <td style="color:var(--primary); font-weight:bold;">${r.submitted.length} 人<br><small>(${r.submitted.join(', ') || '無'})</small></td>
                    <td style="color:var(--exempt); font-weight:bold;">${exempt.length} 人<br><small>(${exempt.join(', ') || '無'})</small></td>
                    <td style="color:#d32f2f; font-weight:bold;">${unhandedArray.length} 人<br><small>(${unhandedArray.join(', ') || '無'})</small></td>
                    <td class="hide-on-export">
                        <div class="action-btns">
                            <button class="edit-btn" onclick="editRecord(${r.id})" style="padding:4px 10px; font-size:13px;">修改</button> 
                            <button class="danger" onclick="deleteRecord(${r.id})" style="padding:4px 10px; font-size:13px;">刪除</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            if (!records.length) {
                const msg = "找不到符合條件的紀錄喔！";
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 20px; color:#666;">${msg}</td></tr>`;
            }
        }

        function deleteRecord(id) { if (confirm("確定刪除這筆紀錄嗎？")) { let records = JSON.parse(localStorage.getItem('sproutRecords')).filter(r => r.id !== id); localStorage.setItem('sproutRecords', JSON.stringify(records)); loadHistory(); } }

        function exportToImage() {
            const captureArea = document.getElementById('captureArea');
            const voiceStatus = document.getElementById('voiceStatus');
            
            let originalStatus = "點擊按鈕，允許麥克風後即可用語音報號喔！";
            if(voiceStatus) {
                originalStatus = voiceStatus.innerHTML;
                voiceStatus.innerHTML = "⌛ 正在產生高品質圖檔，請稍候...";
            }

            html2canvas(captureArea, { 
                backgroundColor: "#ffffff", 
                scale: 2,
                useCORS: true,
                onclone: function(clonedDoc) {
                    const exportBtns = clonedDoc.querySelectorAll('.hide-on-export');
                    exportBtns.forEach(btn => btn.style.display = 'none');
                }
            }).then(canvas => {
                if(voiceStatus) voiceStatus.innerHTML = originalStatus;
                
                canvas.toBlob(async function(blob) {
                    const today = new Date().toISOString().slice(0, 10);
                    const defaultFileName = `班級登記總表_${today}.png`;

                    if (window.showSaveFilePicker) {
                        try {
                            const fileHandle = await window.showSaveFilePicker({
                                suggestedName: defaultFileName,
                                types: [{ description: 'PNG 圖檔', accept: { 'image/png': ['.png'] } }],
                            });
                            const writable = await fileHandle.createWritable();
                            await writable.write(blob);
                            await writable.close();
                            alert("📸 總表圖檔已成功儲存到您指定的位置！");
                        } catch (error) {
                            if (error.name !== 'AbortError') {
                                fallbackDownload(blob, defaultFileName);
                            }
                        }
                    } 
                    else {
                        fallbackDownload(blob, defaultFileName);
                    }
                }, 'image/png');
            });
        }

        function fallbackDownload(blob, fileName) {
            const link = document.createElement('a');
            link.download = fileName;
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(link.href);
            alert("📸 總表圖檔已下載！\n\n(💡小提醒：若未跳出選擇位置的視窗，是因為您的瀏覽器設定開啟了『自動下載』，圖檔已直接存入下載資料夾。)");
        }
    </script>
